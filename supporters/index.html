<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supporter Login | Adrian Wolfe</title>
<meta name="description" content="Encrypted supporter-only articles for Adrian Wolfe subscribers.">
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;900&amp;family=Spline+Sans+Mono:wght@400;500&amp;family=Newsreader:ital,wght@0,400;0,500;1,400&amp;display=swap" rel="stylesheet">
<style>
:root{--ink:#16130f;--paper:#f4efe6;--paper-2:#ece4d6;--accent:#b5361f;--gold:#a9852f;--muted:#6f6557;--line:#d8cdba}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.65}
.wrap{max-width:920px;margin:0 auto;padding:44px 26px 76px}
a{color:var(--accent);text-decoration:none}
.brand{font-family:'Fraunces',serif;font-weight:900;font-size:1.1rem;margin-bottom:58px;display:inline-block;color:var(--ink)}
.brand span{color:var(--accent)}
.mono{font-family:'Spline Sans Mono',monospace;text-transform:uppercase;letter-spacing:.18em;font-size:.68rem;color:var(--gold)}
h1,h2,h3{font-family:'Fraunces',serif;line-height:1.05;letter-spacing:-.02em}
h1{font-size:clamp(2.7rem,8vw,5.4rem);max-width:11ch;margin:18px 0 22px}
.lead{font-size:1.25rem;max-width:44ch;color:#2c261e;margin-bottom:36px}
.login{border:1px solid var(--line);background:rgba(255,255,255,.32);padding:28px;margin-bottom:34px}
.login form{display:flex;gap:10px;flex-wrap:wrap}
.login input{flex:1;min-width:220px;padding:14px 16px;border:1px solid var(--line);background:#fff;font-family:'Newsreader',serif;font-size:1rem}
.btn{display:inline-block;background:var(--ink);color:var(--paper);padding:14px 22px;text-decoration:none;font-family:'Spline Sans Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;border:1px solid var(--ink);cursor:pointer}
.status{margin-top:14px;font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.private-list{display:grid;gap:2px;background:var(--line);border:1px solid var(--line);margin-top:28px}
.private-card{background:var(--paper);padding:28px}
.private-card h2{font-size:1.6rem;margin:10px 0 8px}
.private-card p{color:var(--muted);margin-bottom:14px}
.hidden{display:none}
footer{border-top:1px solid var(--line);margin-top:60px;padding-top:28px;color:var(--muted)}
</style>
</head>
<body>
<main class="wrap">
  <a class="brand" href="../index.html">ADRIAN<span>.</span>WOLFE</a>
  <div class="mono">Supporters</div>
  <h1>Private reading room</h1>
  <p class="lead">Enter the supporter passphrase from the Adrian Wolfe subscriber email to unlock encrypted articles.</p>

  <section class="login" aria-label="Supporter login">
    <form id="unlock-form">
      <input id="passphrase" type="password" autocomplete="current-password" placeholder="Supporter passphrase" aria-label="Supporter passphrase" required>
      <button class="btn" type="submit">Unlock</button>
    </form>
    <div class="status" id="status" aria-live="polite"></div>
  </section>

  <section id="private-content" class="hidden" aria-label="Private supporter articles">
    <div class="mono">Unlocked</div>
    <div id="article-list" class="private-list"></div>
  </section>

  <footer>
    <a href="../index.html">Back to homepage</a>
  </footer>
</main>

<script>
const encryptedPayload={
  version:1,
  kdf:'PBKDF2-SHA256',
  iterations:250000,
  salt:'hcIaOUsLnDyE6XgDG3IwYQ==',
  iv:'k4nmjULAWE4UPL94',
  tag:'ckYW3IXBO/2aFHlAOJLMfA==',
  data:'UcEq/8qJhuL8jT0NhoQTTs8fOoe6GsyUJ3WaWwvyGYGMa7uu8quGgo6ck08OXwxy/oHHcxpVucjU2cRkq26xv9sVAy/yB/YJRqzip7WWQUIrh+5YqyzqbFYV7VrHh0a8EtiSJgE8apEUivVhsuStyeZFnqJAJXQOGlO7VxaCSCYgsWwurBCLrE4+410Rw+RSePj0MvIJvYQtj4r/+vAG5mcYnAjv+WFv1a0z/KMrmSq//kHIIqCNXKnR5g6FtSwHhTxovJQoHnnXgdRtAQjrUUTdwAhVoRO579J06kP01+y301+dc/1FcqCcWrGlaVk1LksLvL/o39+OEJxcvXryJjYgk/JQAzu13II2Y0oFdJhBPHTvrz4TRWLzWmrvD7MZkLLS0a7ytsXAlr2VfL+4pLKq2VdKnsFpJ9MBqlNE7ZhoiPDt33/k60kgutTTYwEaxMWkw9kaB9ZJn0rIZGUhgOidkZCm1KCFU75jNGJTO/HZaw+F'
};
const fromBase64=(value)=>Uint8Array.from(atob(value),char=>char.charCodeAt(0));
async function decryptSupporterContent(passphrase){
  const encoder=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',encoder.encode(passphrase),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:fromBase64(encryptedPayload.salt),iterations:encryptedPayload.iterations,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
  const cipher=fromBase64(encryptedPayload.data);
  const tag=fromBase64(encryptedPayload.tag);
  const combined=new Uint8Array(cipher.length+tag.length);
  combined.set(cipher);
  combined.set(tag,cipher.length);
  const plaintext=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromBase64(encryptedPayload.iv)},key,combined);
  return JSON.parse(new TextDecoder().decode(plaintext));
}
function renderArticles(payload){
  const list=document.getElementById('article-list');
  list.innerHTML='';
  payload.articles.forEach((article)=>{
    const card=document.createElement('article');
    card.className='private-card';
    card.innerHTML=`<div class="mono">${article.tag}</div><h2>${article.title}</h2><p>${article.date}</p>${article.body.map((line)=>`<p>${line}</p>`).join('')}`;
    list.appendChild(card);
  });
  document.getElementById('private-content').classList.remove('hidden');
}
document.getElementById('unlock-form').addEventListener('submit',async(event)=>{
  event.preventDefault();
  const status=document.getElementById('status');
  status.textContent='Checking passphrase...';
  try{
    const payload=await decryptSupporterContent(document.getElementById('passphrase').value);
    renderArticles(payload);
    status.textContent='Unlocked.';
  }catch(error){
    status.textContent='Passphrase not recognized.';
  }
});
</script>
</body>
</html>
